[package]
name = "framec"
version = "0.86.1"
authors = ["Mark Truluck <mark@frame-lang.org>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "framec"
path = "src/main.rs"

[dependencies]
chrono = "0.4"
clap = { version = "4.5" }
convert_case = "0.6"
downcast-rs = "1.2.0"
exitcode = "1.1.2"
serde = { version = "1.0", features = ["derive", "serde_derive"] }
serde_json = "1.0"
sha2 = "0.10"
wasm-bindgen = "0.2.92"
indoc = "2.0"
colored = "2.0"
petgraph = "0.6"
regex = "1.10"
toml = "0.9.5"


[package.metadata.wasm-pack.profile.release]
wasm-opt = false
