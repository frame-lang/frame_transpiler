version: '3.8'

services:
  # Python test runner container
  python-tests:
    build:
      context: .
      dockerfile: prt-test-base.dockerfile
    image: frame-prt-test:latest
    container_name: frame-python-tests
    volumes:
      - ../target/release/framec:/framec/framec:ro
      - ../framec_tests:/fixtures:ro
      - ./results/python:/results
    environment:
      - TEST_LANGUAGE=python
      - TEST_RUNNER=/framec/framec
      - FRAME_EXEC_MARKERS=1
    command: |
      bash -c "
        /framec/framec test \
          --language python \
          --category all_v3 \
          --report-format json \
          --output /results/report.json
      "
    networks:
      - test-network

  # TypeScript test runner container
  typescript-tests:
    build:
      context: .
      dockerfile: prt-test-base.dockerfile
    image: frame-prt-test:latest
    container_name: frame-typescript-tests
    volumes:
      - ../target/release/framec:/framec/framec:ro
      - ../framec_tests:/fixtures:ro
      - ./results/typescript:/results
    environment:
      - TEST_LANGUAGE=typescript
      - TEST_RUNNER=/framec/framec
      - FRAME_EXEC_MARKERS=1
    command: |
      bash -c "
        /framec/framec test \
          --language typescript \
          --category all_v3 \
          --report-format json \
          --output /results/report.json
      "
    networks:
      - test-network

  # Rust test runner container
  rust-tests:
    build:
      context: .
      dockerfile: prt-test-base.dockerfile
    image: frame-prt-test:latest
    container_name: frame-rust-tests
    volumes:
      - ../target/release/framec:/framec/framec:ro
      - ../framec_tests:/fixtures:ro
      - ./results/rust:/results
    environment:
      - TEST_LANGUAGE=rust
      - TEST_RUNNER=/framec/framec
      - FRAME_EXEC_MARKERS=1
    command: |
      bash -c "
        /framec/framec test \
          --language rust \
          --category all_v3 \
          --report-format json \
          --output /results/report.json
      "
    networks:
      - test-network

  # Parallel test orchestrator
  test-orchestrator:
    build:
      context: .
      dockerfile: prt-test-base.dockerfile
    image: frame-prt-test:latest
    container_name: frame-test-orchestrator
    volumes:
      - ../target/release/framec:/framec/framec:ro
      - ../framec_tests:/fixtures:ro
      - ./results:/results
    environment:
      - PARALLEL_WORKERS=4
      - TEST_TIMEOUT=300
    depends_on:
      - python-tests
      - typescript-tests
      - rust-tests
    command: |
      bash -c "
        echo 'Waiting for test completion...' &&
        sleep 5 &&
        echo 'Aggregating results...' &&
        python3 -c '
import json
import glob
results = []
for f in glob.glob(\"/results/*/report.json\"):
    with open(f) as rf:
        results.append(json.load(rf))
with open(\"/results/aggregated.json\", \"w\") as out:
    json.dump({\"languages\": results}, out, indent=2)
print(f\"Aggregated {len(results)} test results\")
        '
      "
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  test-results: