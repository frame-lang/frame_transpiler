name: V3 Suites (All Languages)

on:
  workflow_dispatch:
  push:
    branches: [ going_native, main ]
  pull_request:
    branches: [ main ]

jobs:
  v3-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-v3all-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Frame Transpiler (release)
        run: cargo build --release

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run V3 suites (transpile-only)
        run: |
          python3 framec_tests/runner/frame_test_runner.py \
            --languages python typescript csharp c cpp java rust \
            --categories all_v3 \
            --framec ./target/release/framec \
            --transpile-only \
            -v

